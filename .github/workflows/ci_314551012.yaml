name: ci_314551012

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  checks: write

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Prettier check
        run: npm run format:check

      - name: Run tests with JUnit report
        run: |
          mkdir -p test-results
          npx vitest run --reporter=default --reporter=junit --outputFile=test-results/vitest-junit.xml

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/vitest-junit.xml
          if-no-files-found: warn

      - name: Publish test report in Actions UI
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results
          path: test-results/vitest-junit.xml
          reporter: java-junit
          fail-on-error: true
